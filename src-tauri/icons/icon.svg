<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Central Eye/Planet -->
  <circle cx="50" cy="50" r="8" fill="black" />
  
  <!-- Inner Ring -->
  <ellipse cx="50" cy="50" rx="22" ry="12" stroke="black" strokeWidth="4" />
  
  <!-- Middle Ring -->
  <ellipse cx="50" cy="50" rx="38" ry="22" stroke="black" strokeWidth="4" />
  
  <!-- Outer Ring -->
  <ellipse cx="50" cy="50" rx="54" ry="32" stroke="black" strokeWidth="4" />
  
  <!-- Orbital Dots -->
  <circle cx="12" cy="50" r="6" fill="black" />
  <circle cx="75" cy="22" r="6" fill="black" />
  <circle cx="82" cy="72" r="6" fill="black" />
</svg>
